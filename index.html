<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is the Cat Grumpy?</title>
<style>
  * { box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at top, #3a3d5c, #1b1d2b 70%);
    font-family:'Poppins','Segoe UI',Tahoma,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    text-align:center;
    overflow:hidden;
    color:#fff;
  }

  .card{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:28px;
    padding:40px 35px;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
    max-width:380px;
    width:100%;
  }

  img.cat{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:50%;
    box-shadow:0 12px 30px rgba(0,0,0,.5);
    border:5px solid rgba(255,255,255,0.85);
    margin-bottom:28px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float{
    0%,100%{ transform: translateY(0px); }
    50%{ transform: translateY(-10px); }
  }

  h1{
    font-size:1.5em;
    margin:0 0 30px;
    line-height:1.4;
    text-shadow:1px 1px 6px rgba(0,0,0,.4);
  }

  .buttons{
    position:relative;
    display:flex;
    gap:20px;
    height:75px;
    align-items:center;
    justify-content:center;
  }

  button{
    font-size:1.05em;
    padding:14px 32px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    letter-spacing:.5px;
    transition:transform .15s ease, box-shadow .15s ease;
  }

  #yesBtn{
    background:linear-gradient(135deg,#4caf50,#2e7d32);
    color:#fff;
    box-shadow:0 6px 18px rgba(76,175,80,.4);
  }
  #yesBtn:hover{
    transform:scale(1.08);
    box-shadow:0 8px 22px rgba(76,175,80,.55);
  }

  #noBtn{
    background:linear-gradient(135deg,#e63946,#b71c1c);
    color:#fff;
    position:relative;
    box-shadow:0 6px 18px rgba(230,57,70,.4);
  }

  #result{
    display:none;
    margin-top:30px;
    background:#fff;
    color:#1b1d2b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    animation: pop .35s ease;
  }

  @keyframes pop{
    from{ transform: scale(0.7); opacity:0; }
    to{ transform: scale(1); opacity:1; }
  }

  #result .emoji{
    font-size:80px;
  }

  #result p{
    font-size:1.5em;
    font-weight:700;
    margin-top:12px;
  }

  .sub{
    font-size:.85em;
    opacity:.6;
    margin-top:18px;
  }
</style>
</head>

<script>
  const noBtn = document.getElementById('noBtn');

  function moveAway(){
    const x = (Math.random() - 0.5) * 220;
    const y = (Math.random() - 0.5) * 130;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
  }

  noBtn.addEventListener('mouseenter', moveAway);
  noBtn.addEventListener('click', function(e){
    e.preventDefault();
    moveAway();
  });

  function showHappy(){
    document.getElementById('page1').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  }
